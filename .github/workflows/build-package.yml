name: qimgv-qt6-ultimate-fix
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    outputs:
      build_name: ${{ steps.vars.outputs.build_name }}
      build_file_name: ${{ steps.vars.outputs.build_file_name }}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git 
            p7zip 
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-ntldd
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-qt6-imageformats
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-libjxl
            mingw-w64-x86_64-libraw
            mingw-w64-x86_64-exiv2
            mingw-w64-x86_64-opencv
            mingw-w64-x86_64-mpv
            mingw-w64-x86_64-lcms2
            mingw-w64-x86_64-libavif
            mingw-w64-x86_64-libheif

      - uses: actions/checkout@v4
        with: 
          fetch-depth: 0

      - name: Set Variables
        id: vars
        run: |
          BNAME="qimgv-x64-qt6_$(git describe --tags --always)"
          echo "build_name=${BNAME}" >> $GITHUB_OUTPUT
          echo "build_file_name=${BNAME}.7z" >> $GITHUB_OUTPUT

      - name: Fix Windows Unicode Path Issue
        run: |
          sed -i 's/entry\.path()\.generic_string()\.c_str()/entry.path().wstring().c_str()/g' \
            qimgv/components/directorymanager/directorymanager.cpp

      - name: Build qimgv
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_QT5=OFF \
            -DVIDEO_SUPPORT=ON \
            -DOPENCV_SUPPORT=ON \
            -DCMAKE_PREFIX_PATH=/mingw64
          cmake --build build --config Release

      - name: Prepare Package
        run: |
          TARGET_DIR="./${{ steps.vars.outputs.build_name }}"
          mkdir -p "${TARGET_DIR}/imageformats"
          mkdir -p "${TARGET_DIR}/translations"
          
          # 1. 拷贝主程序
          cp build/qimgv/qimgv.exe "${TARGET_DIR}/"
          
          # 2. 下载并安装 JXL 插件
          echo "Downloading JXL plugin..."
          curl -L -o "${TARGET_DIR}/imageformats/qjpegxl6.dll" \
            https://github.com/novomesk/qt-jpegxl-image-plugin/releases/latest/download/qjpegxl6.dll
          
          # 3. 部署 Qt6 基础环境
          windeployqt6 --no-translations --compiler-runtime --no-opengl-sw "${TARGET_DIR}/qimgv.exe" || true
          
          # 4. 强制补充官方图像格式 DLL
          cp -f /mingw64/share/qt6/plugins/imageformats/*.dll "${TARGET_DIR}/imageformats/" || true
          
          # 5. 拷贝 qimgv 自身的翻译文件
          cp -f build/qimgv/translations/*.qm "${TARGET_DIR}/translations/" || true
          
          # 6. 核心修复：自动化依赖收集
          echo "Collecting DLLs using flexible matching..."
          
          CP_PATTERNS=(
            "libexiv2*.dll" "libmpv*.dll" "libopencv_core*.dll" "libopencv_imgproc*.dll" 
            "libjxl*.dll" "libraw*.dll" "libheif*.dll" "libavif*.dll" "libwebp*.dll" 
            "libhwy*.dll" "libbrotli*.dll" "libstdc++*.dll" "libgcc_s*.dll" "libwinpthread*.dll"
            "liblcms2*.dll" "libpng*.dll" "libjpeg*.dll" "libtiff*.dll" "libaom*.dll" "zlib*.dll"
          )
          
          for pattern in "${CP_PATTERNS[@]}"; do
            find /mingw64/bin -maxdepth 1 -name "$pattern" -exec cp -t "${TARGET_DIR}/" {} + 2>/dev/null || true
          done

          # 7. 深度依赖扫描 - 详细诊断版
          echo "Scanning for deep dependencies (diagnostic mode)..."
          for i in {1..3}; do
            echo "=== Dependency scan pass #$i ==="
            # 对每个文件进行分析
            find "${TARGET_DIR}" -name "*.exe" -o -name "*.dll" | while read -r file; do
              echo "Checking: $file"
              # 运行 ntldd，捕获输出和错误
              ntldd_output=$(ntldd -R "$file" 2>&1)
              ntldd_ret=$?
              if [ $ntldd_ret -ne 0 ]; then
                echo "Warning: ntldd returned $ntldd_ret for $file, output: $ntldd_output"
                continue
              fi
              # 提取 mingw64 路径的依赖，忽略 grep 无匹配的错误
              echo "$ntldd_output" | grep "=> /mingw64" | awk '{print $3}' | while read -r dep; do
                if [ -f "$dep" ]; then
                  cp -n "$dep" "${TARGET_DIR}/" 2>/dev/null && echo "Copied: $(basename "$dep")" || echo "File already exists: $(basename "$dep")"
                else
                  echo "Warning: Missing dependency file: $dep (referenced by $file)"
                fi
              done || true   # 忽略 grep/awk 管道失败
            done || true     # 忽略 find 循环的整体失败
          done
          
          # 8. 生成 qt.conf
          echo -e "[Paths]\nPrefix = .\nPlugins = .\nTranslations = translations" > "${TARGET_DIR}/qt.conf"
          
          echo "Package preparation completed."

      - name: Compress
        run: |
          7z a "${{ steps.vars.outputs.build_file_name }}" "./${{ steps.vars.outputs.build_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: qimgv-binary
          path: ${{ steps.vars.outputs.build_file_name }}

  upload-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with: 
          name: qimgv-binary
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ needs.build.outputs.build_file_name }}
          prerelease: true
          tag_name: latest-dev-qt6
          name: ${{ needs.build.outputs.build_name }}
          body: "Auto-fix: Diagnostic mode for DLL scanning."
