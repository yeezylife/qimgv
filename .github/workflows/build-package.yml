name: qimgv-qt6-ultimate-fix
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    outputs:
      build_name: ${{ steps.vars.outputs.build_name }}
      build_file_name: ${{ steps.vars.outputs.build_file_name }}

    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            p7zip
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-ntldd
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-svg
            mingw-w64-ucrt-x86_64-qt6-imageformats
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-kimageformats
            mingw-w64-ucrt-x86_64-libjxl
            mingw-w64-ucrt-x86_64-libraw
            mingw-w64-ucrt-x86_64-exiv2
            mingw-w64-ucrt-x86_64-opencv
            mingw-w64-ucrt-x86_64-mpv
            mingw-w64-ucrt-x86_64-lcms2
            mingw-w64-ucrt-x86_64-libavif
            mingw-w64-ucrt-x86_64-libheif

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Variables
        id: vars
        run: |
          BNAME="qimgv-x64-qt6_$(git describe --tags --always)"
          echo "build_name=${BNAME}" >> $GITHUB_OUTPUT
          echo "build_file_name=${BNAME}.7z" >> $GITHUB_OUTPUT

      - name: Fix Windows Unicode Path Issue
        run: |
          sed -i 's/entry\.path()\.generic_string()\.c_str()/entry.path().wstring().c_str()/g' \
            qimgv/components/directorymanager/directorymanager.cpp

      - name: Build qimgv
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_QT5=OFF \
            -DVIDEO_SUPPORT=ON \
            -DOPENCV_SUPPORT=ON \
            -DCMAKE_PREFIX_PATH=/ucrt64
          cmake --build build --config Release

      - name: Prepare Package
        run: |
          TARGET_DIR="./${{ steps.vars.outputs.build_name }}"
          mkdir -p "${TARGET_DIR}/imageformats"
          mkdir -p "${TARGET_DIR}/translations"
          mkdir -p "${TARGET_DIR}/platforms"
          mkdir -p "${TARGET_DIR}/styles"

          cp build/qimgv/qimgv.exe "${TARGET_DIR}/"

          echo "Copying kimageformats plugins..."
          cp -f /ucrt64/share/qt6/plugins/imageformats/qjxl.dll "${TARGET_DIR}/imageformats/" || true

          echo "Deploying Qt dependencies..."
          windeployqt --verbose --no-translations --compiler-runtime --no-opengl-sw "${TARGET_DIR}/qimgv.exe" || true

          echo "Copying Qt image format plugins..."
          cp -f /ucrt64/share/qt6/plugins/imageformats/*.dll "${TARGET_DIR}/imageformats/" || true

          cp -f /ucrt64/share/qt6/plugins/platforms/qwindows.dll "${TARGET_DIR}/platforms/" || true
          cp -f /ucrt64/share/qt6/plugins/styles/*.dll "${TARGET_DIR}/styles/" || true

          cp -f build/qimgv/translations/*.qm "${TARGET_DIR}/translations/" || true
          cp -f /ucrt64/share/qt6/translations/qt_*.qm "${TARGET_DIR}/translations/" || true

          echo "Collecting ALL required DLLs..."

          QT_PATTERNS=(
            "Qt6Core*.dll" "Qt6Gui*.dll" "Qt6Widgets*.dll" "Qt6Svg*.dll"
            "Qt6Network*.dll" "Qt6Concurrent*.dll" "Qt6DBus*.dll"
            "Qt6PrintSupport*.dll"
            "libb2*.dll" "libdouble-conversion*.dll"
            "libicudata*.dll" "libicuin*.dll" "libicuuc*.dll"
            "libfreetype*.dll" "libharfbuzz*.dll" "libgraphite2*.dll"
            "libpng*.dll" "libjpeg*.dll" "libtiff*.dll"
          )

          KIMAGEFORMATS_PATTERNS=(
            "libjxl*.dll" "libjxl_threads*.dll"
            "liblcms2*.dll" "libpng*.dll"
          )

          OPENCV_PATTERNS=(
            "libopencv_core*.dll" "libopencv_imgproc*.dll" "libopencv_imgcodecs*.dll"
            "libopencv_videoio*.dll" "libopencv_highgui*.dll"
            "libtbb*.dll" "libopenblas*.dll" "liblapack*.dll"
          )

          IMAGE_PATTERNS=(
            "libraw*.dll" "libheif*.dll" "libavif*.dll"
            "libwebp*.dll" "libwebpdemux*.dll"
            "libhwy*.dll" "libbrotli*.dll" "libaom*.dll"
          )

          MEDIA_PATTERNS=(
            "libmpv*.dll" "libavcodec*.dll" "libavformat*.dll" "libavutil*.dll"
            "libswscale*.dll" "libswresample*.dll"
            "libexiv2*.dll"
          )

          RUNTIME_PATTERNS=(
            "libstdc++*.dll" "libgcc_s*.dll" "libwinpthread*.dll"
            "zlib*.dll" "libzstd*.dll"
          )

          ALL_PATTERNS=(
            "${QT_PATTERNS[@]}" "${KIMAGEFORMATS_PATTERNS[@]}" "${OPENCV_PATTERNS[@]}"
            "${IMAGE_PATTERNS[@]}" "${MEDIA_PATTERNS[@]}" "${RUNTIME_PATTERNS[@]}"
          )

          for pattern in "${ALL_PATTERNS[@]}"; do
            find /ucrt64/bin -maxdepth 1 -name "$pattern" -exec cp -t "${TARGET_DIR}/" {} + 2>/dev/null || true
          done

          echo "Scanning for deep dependencies..."
          for i in {1..5}; do
            echo "Pass #$i"
            find "${TARGET_DIR}" \( -name "*.exe" -o -name "*.dll" \) -print0 | \
              xargs -0 ntldd -R 2>/dev/null | \
              grep "=> /ucrt64" | \
              awk '{print $3}' | \
              sort -u | \
              xargs -r -I {} cp -n {} "${TARGET_DIR}/" 2>/dev/null || true
          done

          echo "Copying remaining lib*.dll as fallback..."
          find /ucrt64/bin -maxdepth 1 -name "lib*.dll" -exec cp -n -t "${TARGET_DIR}/" {} + 2>/dev/null || true

          echo -e "[Paths]\nPrefix = .\nPlugins = plugins\nTranslations = translations" > "${TARGET_DIR}/qt.conf"

          echo "Verifying JXL support..."
          if [ -f "${TARGET_DIR}/imageformats/qjxl.dll" ]; then
            echo "✓ qjxl.dll (kimageformats) found"
          else
            echo "✗ qjxl.dll MISSING!"
          fi
          if [ -f "${TARGET_DIR}/libjxl.dll" ]; then
            echo "✓ libjxl.dll found"
          else
            echo "✗ libjxl.dll MISSING!"
          fi

          echo "Package preparation completed."
          echo "Total files in package: $(find "${TARGET_DIR}" -type f | wc -l)"

      - name: Compress
        run: |
          7z a "${{ steps.vars.outputs.build_file_name }}" "./${{ steps.vars.outputs.build_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: qimgv-binary
          path: ${{ steps.vars.outputs.build_file_name }}

  upload-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: qimgv-binary

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ needs.build.outputs.build_file_name }}
          prerelease: true
          tag_name: latest-dev-qt6
          name: ${{ needs.build.outputs.build_name }}
          body: "Fixed: Added kimageformats for proper JXL support (Qt6)."
