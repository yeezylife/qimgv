name: qimgv-qt6-slim
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    outputs:
      build_name: ${{ steps.vars.outputs.build_name }}
      build_file_name: ${{ steps.vars.outputs.build_file_name }}

    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            p7zip
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-ntldd
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-svg
            mingw-w64-ucrt-x86_64-qt6-imageformats
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-kimageformats
            mingw-w64-ucrt-x86_64-libjxl
            mingw-w64-ucrt-x86_64-libraw
            mingw-w64-ucrt-x86_64-exiv2
            mingw-w64-ucrt-x86_64-opencv
            mingw-w64-ucrt-x86_64-mpv
            mingw-w64-ucrt-x86_64-lcms2
            mingw-w64-ucrt-x86_64-libavif
            mingw-w64-ucrt-x86_64-libheif

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Variables
        id: vars
        run: |
          BNAME="qimgv-x64-qt6_$(git describe --tags --always)"
          echo "build_name=${BNAME}" >> $GITHUB_OUTPUT
          echo "build_file_name=${BNAME}.7z" >> $GITHUB_OUTPUT

      # ❌ 删除错误的 sed 修改（这是导致 Exiv2 报错的原因）
      - name: Remove broken Unicode patch
        run: |
          echo "No Unicode patch applied (previous sed removed)."

      - name: Build qimgv
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_QT5=OFF \
            -DVIDEO_SUPPORT=ON \
            -DOPENCV_SUPPORT=ON \
            -DCMAKE_PREFIX_PATH=/ucrt64
          cmake --build build --config Release

      - name: Prepare Slim Package
        run: |
          TARGET="./${{ steps.vars.outputs.build_name }}"
          mkdir -p "$TARGET"
          mkdir -p "$TARGET/plugins/imageformats"
          mkdir -p "$TARGET/plugins/platforms"
          mkdir -p "$TARGET/plugins/styles"
          mkdir -p "$TARGET/translations"

          echo "Copy main executable"
          cp build/qimgv/qimgv.exe "$TARGET/"

          echo "Copy required Qt plugins"
          cp /ucrt64/share/qt6/plugins/platforms/qwindows.dll "$TARGET/plugins/platforms/"
          cp /ucrt64/share/qt6/plugins/styles/qwindowsvistastyle.dll "$TARGET/plugins/styles/" || true

          # Image formats (only essential)
          cp /ucrt64/share/qt6/plugins/imageformats/qjpeg.dll "$TARGET/plugins/imageformats/"
          cp /ucrt64/share/qt6/plugins/imageformats/qgif.dll "$TARGET/plugins/imageformats/"
          cp /ucrt64/share/qt6/plugins/imageformats/qico.dll "$TARGET/plugins/imageformats/"
          cp /ucrt64/share/qt6/plugins/imageformats/qsvg.dll "$TARGET/plugins/imageformats/"
          cp /ucrt64/share/qt6/plugins/imageformats/qjxl.dll "$TARGET/plugins/imageformats/" || true
          cp /ucrt64/share/qt6/plugins/imageformats/qheif.dll "$TARGET/plugins/imageformats/" || true
          cp /ucrt64/share/qt6/plugins/imageformats/qavif.dll "$TARGET/plugins/imageformats/" || true

          echo "Copy translations"
          cp /ucrt64/share/qt6/translations/qt_*.qm "$TARGET/translations/" || true

          echo "Create qt.conf"
          cat > "$TARGET/qt.conf" <<EOF
[Paths]
Prefix = .
Plugins = plugins
Translations = translations
EOF

          echo "Start reverse dependency scan"
          while true; do
            NEW=0
            for f in $(find "$TARGET" -name "*.exe" -o -name "*.dll"); do
              ntldd -R "$f" 2>/dev/null | grep "=> /ucrt64" | awk '{print $3}' | while read dep; do
                base=$(basename "$dep")
                if [ ! -f "$TARGET/$base" ]; then
                  cp "$dep" "$TARGET/"
                  echo "Added: $base"
                  NEW=1
                fi
              done
            done
            [ $NEW -eq 0 ] && break
          done

          echo "Slim package ready"
          echo "Total files: $(find "$TARGET" -type f | wc -l)"

      - name: Compress
        run: |
          7z a "${{ steps.vars.outputs.build_file_name }}" "./${{ steps.vars.outputs.build_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: qimgv-binary
          path: ${{ steps.vars.outputs.build_file_name }}

  upload-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: qimgv-binary

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ needs.build.outputs.build_file_name }}
          prerelease: true
          tag_name: latest-dev-qt6-slim
          name: ${{ needs.build.outputs.build_name }}
          body: "Slim build: reverse dependency scan + minimal Qt plugins."
