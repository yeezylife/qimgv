name: qimgv-qt6-slim
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    outputs:
      build_name: ${{ steps.vars.outputs.build_name }}
      build_file_name: ${{ steps.vars.outputs.build_file_name }}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            p7zip
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-ntldd
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-svg
            mingw-w64-ucrt-x86_64-qt6-imageformats
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-kimageformats
            mingw-w64-ucrt-x86_64-libjxl
            mingw-w64-ucrt-x86_64-libraw
            mingw-w64-ucrt-x86_64-exiv2
            mingw-w64-ucrt-x86_64-opencv
            mingw-w64-ucrt-x86_64-mpv
            mingw-w64-ucrt-x86_64-lcms2
            mingw-w64-ucrt-x86_64-libavif
            mingw-w64-ucrt-x86_64-libheif
            python3

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Variables
        id: vars
        run: |
          BNAME="qimgv-x64-qt6_$(git describe --tags --always)"
          echo "build_name=${BNAME}" >> $GITHUB_OUTPUT
          echo "build_file_name=${BNAME}.7z" >> $GITHUB_OUTPUT

      - name: Build qimgv
        run: |
          # 优化点 1：通过链接器参数 -Wl,-s 在构建时即剔除符号表
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_QT5=OFF \
            -DVIDEO_SUPPORT=ON \
            -DOPENCV_SUPPORT=ON \
            -DCMAKE_PREFIX_PATH=/ucrt64 \
            -DCMAKE_EXE_LINKER_FLAGS="-Wl,-s" \
            -DCMAKE_SHARED_LINKER_FLAGS="-Wl,-s"
          cmake --build build --config Release

      - name: Prepare Slim Package (Optimized)
        run: |
          TARGET="./${{ steps.vars.outputs.build_name }}"
          mkdir -p "$TARGET/imageformats"
          mkdir -p "$TARGET/platforms"
          mkdir -p "$TARGET/styles"

          echo "--- Copying Core Executable ---"
          cp build/qimgv/qimgv.exe "$TARGET/"

          echo "--- Collecting Plugins from MSYS2 ---"
          PLUGIN_SOURCES=(
            "/ucrt64/lib/qt6/plugins"
            "/ucrt64/share/qt6/plugins"
            "/ucrt64/lib/kf6/plugins"
            "/ucrt64/share/kf6/plugins"
          )

          for src in "${PLUGIN_SOURCES[@]}"; do
            if [ -d "$src" ]; then
              [ -d "$src/platforms" ] && cp -n "$src/platforms/qwindows.dll" "$TARGET/platforms/" 2>/dev/null || true
              [ -d "$src/imageformats" ] && cp -n "$src/imageformats"/*.dll "$TARGET/imageformats/" 2>/dev/null || true
              [ -d "$src/styles" ] && cp -n "$src/styles"/*.dll "$TARGET/styles/" 2>/dev/null || true
            fi
          done

          echo "--- Creating qt.conf ---"
          echo -e "[Paths]\nPrefix = .\nLibraryExecutables = ." > "$TARGET/qt.conf"

          echo "--- Starting Greedy Dependency Resolver with Strip ---"
          python3 - <<EOF
          import os, subprocess, shutil
          from pathlib import Path

          target_dir = os.path.abspath("$TARGET")
          
          def get_ntldd_deps(file_path):
              try:
                  out = subprocess.check_output(["ntldd", "-R", file_path], stderr=subprocess.DEVNULL).decode('utf-8', 'ignore')
                  deps = []
                  for line in out.splitlines():
                      if "=>" in line and "ucrt64" in line.lower():
                          path = line.split("=>")[1].split("(")[0].strip()
                          if os.path.exists(path):
                              deps.append(path)
                  return deps
              except:
                  return []

          scanned_files = set()
          while True:
              found_new = False
              current_files = list(Path(target_dir).rglob("*.exe")) + list(Path(target_dir).rglob("*.dll"))
              
              for f in current_files:
                  f_path = str(f)
                  if f_path in scanned_files: continue
                  
                  deps = get_ntldd_deps(f_path)
                  for d in deps:
                      d_name = os.path.basename(d)
                      dest = os.path.join(target_dir, d_name)
                      if not os.path.exists(dest):
                          print(f"  [+] Found & Stripping: {d_name}")
                          shutil.copy2(d, dest)
                          # 优化点 2：在拷贝后立即执行 strip 剔除不必要的调试信息
                          subprocess.run(["strip", "--strip-unneeded", dest])
                          found_new = True
                  scanned_files.add(f_path)
              
              if not found_new: break
          EOF

          # 最后对主程序及其它可能遗漏的插件 DLL 统一做一次 strip 处理
          echo "--- Finalizing executable stripping ---"
          strip --strip-unneeded "$TARGET/qimgv.exe"
          find "$TARGET" -name "*.dll" -exec strip --strip-unneeded {} + 2>/dev/null || true

          echo "--- Package Verification ---"
          echo "Total file count: $(find "$TARGET" -type f | wc -l)"
          du -sh "$TARGET"

      - name: Compress
        run: |
          7z a -mx=9 "${{ steps.vars.outputs.build_file_name }}" "./${{ steps.vars.outputs.build_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: qimgv-binary
          path: ${{ steps.vars.outputs.build_file_name }}

  upload-release:
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: qimgv-binary
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ needs.build.outputs.build_file_name }}
          prerelease: true
          tag_name: latest-dev-qt6-slim
          name: ${{ needs.build.outputs.build_name }}
          body: |
            ### Slim Portable Build (Optimized)
            - **Linker Stripping**: Enabled `-Wl,-s`.
            - **Runtime Stripping**: All DLLs processed via `strip --strip-unneeded`.
            - **Full Format Support**: JXL, AVIF, HEIC, OpenCV, MPV included.
