name: qimgv-qt6-slim
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    outputs:
      build_name: ${{ steps.vars.outputs.build_name }}
      build_file_name: ${{ steps.vars.outputs.build_file_name }}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            p7zip
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-ntldd
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-svg
            mingw-w64-ucrt-x86_64-qt6-imageformats
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-kimageformats
            mingw-w64-ucrt-x86_64-libjxl
            mingw-w64-ucrt-x86_64-libraw
            mingw-w64-ucrt-x86_64-exiv2
            mingw-w64-ucrt-x86_64-opencv
            mingw-w64-ucrt-x86_64-mpv
            mingw-w64-ucrt-x86_64-lcms2
            mingw-w64-ucrt-x86_64-libavif
            mingw-w64-ucrt-x86_64-libheif

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Variables
        id: vars
        run: |
          BNAME="qimgv-x64-qt6_$(git describe --tags --always)"
          echo "build_name=${BNAME}" >> $GITHUB_OUTPUT
          echo "build_file_name=${BNAME}.7z" >> $GITHUB_OUTPUT

      - name: Build qimgv
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_QT5=OFF \
            -DVIDEO_SUPPORT=ON \
            -DOPENCV_SUPPORT=ON \
            -DCMAKE_PREFIX_PATH=/ucrt64
          cmake --build build --config Release

      - name: Prepare Slim Package
        run: |
          TARGET="./${{ steps.vars.outputs.build_name }}"
          mkdir -p "$TARGET/plugins/imageformats"
          mkdir -p "$TARGET/plugins/platforms"
          mkdir -p "$TARGET/plugins/styles"

          echo "--- Copying core executable ---"
          cp build/qimgv/qimgv.exe "$TARGET/"

          echo "--- Copying Qt plugins ---"
          # 平台插件 (Windows 运行必需)
          cp /ucrt64/share/qt6/plugins/platforms/qwindows.dll "$TARGET/plugins/platforms/"
          
          # 样式插件 (防止界面回退到 Windows 95 风格)
          cp /ucrt64/share/qt6/plugins/styles/qfusionstyle.dll "$TARGET/plugins/styles/" 2>/dev/null || true
          cp /ucrt64/share/qt6/plugins/styles/qwindowsvistastyle.dll "$TARGET/plugins/styles/" 2>/dev/null || true

          # 图像格式插件
          for fmt in qjpeg.dll qgif.dll qico.dll qsvg.dll qwebp.dll qwbmp.dll; do
            [ -f "/ucrt64/share/qt6/plugins/imageformats/$fmt" ] && cp "/ucrt64/share/qt6/plugins/imageformats/$fmt" "$TARGET/plugins/imageformats/"
          done

          # KDE 扩展图像格式 (HEIC, AVIF, JXL)
          for kfmt in kimg_jxl.dll kimg_heif.dll kimg_avif.dll kimg_exr.dll kimg_hdr.dll; do
            [ -f "/ucrt64/share/kf6/plugins/imageformats/$kfmt" ] && cp "/ucrt64/share/kf6/plugins/imageformats/$kfmt" "$TARGET/plugins/imageformats/"
          done

          echo "--- Writing qt.conf ---"
          # 强制程序去 plugins 目录找 DLL
          echo -e "[Paths]\nPrefix = .\nPlugins = plugins" > "$TARGET/qt.conf"

          echo "--- Starting Recursive Dependency Scan ---"
          # 核心修复：使用一个非管道形式的 while 循环，确保 NEW_DEP 变量能逃出循环
          iteration=0
          while true; do
            iteration=$((iteration+1))
            NEW_DEP_FOUND=0
            echo "Scan iteration: $iteration"
            
            # 获取当前目录内所有的二进制文件
            FILES=$(find "$TARGET" -type f \( -name "*.exe" -o -name "*.dll" \))
            
            for f in $FILES; do
              # 使用 ntldd 找出所有指向 /ucrt64 系统的依赖
              # 注意：awk '{print $3}' 提取的是 DLL 的完整系统路径
              deps=$(ntldd -R "$f" 2>/dev/null | grep "=> /ucrt64" | awk '{print $3}')
              
              for dep_path in $deps; do
                dep_name=$(basename "$dep_path")
                if [ ! -f "$TARGET/$dep_name" ]; then
                  cp "$dep_path" "$TARGET/"
                  echo "  [+] Added $dep_name (required by $(basename $f))"
                  NEW_DEP_FOUND=1
                fi
              done
            done

            # 如果这一轮扫描没有增加任何新文件，说明依赖已补全，退出循环
            if [ "$NEW_DEP_FOUND" -eq 0 ]; then
              break
            fi
            
            # 安全阈值，防止无限循环
            if [ $iteration -gt 20 ]; then break; fi
          done

          echo "--- Slim package ready ---"
          echo "Total files count: $(find "$TARGET" -type f | wc -l)"
          du -sh "$TARGET"

      - name: Compress
        run: |
          7z a "${{ steps.vars.outputs.build_file_name }}" "./${{ steps.vars.outputs.build_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: qimgv-binary
          path: ${{ steps.vars.outputs.build_file_name }}

  upload-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: qimgv-binary
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ needs.build.outputs.build_file_name }}
          prerelease: true
          tag_name: latest-dev-qt6-slim
          name: ${{ needs.build.outputs.build_name }}
          body: "Slim build: recursive dependency scan + minimal Qt/KF6 plugins."
