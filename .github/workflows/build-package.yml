name: qimgv-qt6-slim
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    outputs:
      build_name: ${{ steps.vars.outputs.build_name }}
      build_file_name: ${{ steps.vars.outputs.build_file_name }}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git p7zip mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja mingw-w64-ucrt-x86_64-ntldd
            mingw-w64-ucrt-x86_64-qt6-base mingw-w64-ucrt-x86_64-qt6-svg
            mingw-w64-ucrt-x86_64-qt6-imageformats mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-kimageformats mingw-w64-ucrt-x86_64-libjxl
            mingw-w64-ucrt-x86_64-libraw mingw-w64-ucrt-x86_64-exiv2
            mingw-w64-ucrt-x86_64-opencv mingw-w64-ucrt-x86_64-mpv
            mingw-w64-ucrt-x86_64-lcms2 mingw-w64-ucrt-x86_64-libavif
            mingw-w64-ucrt-x86_64-libheif python3

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Variables
        id: vars
        run: |
          BNAME="qimgv-x64-qt6_$(git describe --tags --always)"
          echo "build_name=${BNAME}" >> $GITHUB_OUTPUT
          echo "build_file_name=${BNAME}.7z" >> $GITHUB_OUTPUT

      - name: Build qimgv
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_QT5=OFF \
            -DVIDEO_SUPPORT=ON \
            -DOPENCV_SUPPORT=ON \
            -DCMAKE_PREFIX_PATH=/ucrt64
          cmake --build build --config Release

      - name: Prepare Slim Package (Python Powered)
        run: |
          TARGET="./${{ steps.vars.outputs.build_name }}"
          mkdir -p "$TARGET/plugins/imageformats"
          mkdir -p "$TARGET/plugins/platforms"

          echo "--- Copying Core Files ---"
          cp build/qimgv/qimgv.exe "$TARGET/"
          
          # 初始拷贝核心 Qt 插件
          cp /ucrt64/share/qt6/plugins/platforms/qwindows.dll "$TARGET/plugins/platforms/"
          cp /ucrt64/share/qt6/plugins/imageformats/q{jpeg,gif,ico,svg,webp}.dll "$TARGET/plugins/imageformats/" 2>/dev/null || true
          cp /ucrt64/share/kf6/plugins/imageformats/kimg_{jxl,heif,avif,hdr}.dll "$TARGET/plugins/imageformats/" 2>/dev/null || true

          echo "--- Writing qt.conf ---"
          echo -e "[Paths]\nPrefix = .\nPlugins = plugins" > "$TARGET/qt.conf"

          echo "--- Running Robust Dependency Scanner ---"
          # 使用 Python 处理 ntldd 输出，避开 Shell 路径匹配失败和退出码问题
          python3 - <<EOF
          import os, subprocess, shutil
          from pathlib import Path

          target_dir = os.path.abspath("$TARGET")
          ucrt_bin = "/ucrt64/bin"
          
          def get_deps(file_path):
              try:
                  result = subprocess.check_output(["ntldd", "-R", file_path], stderr=subprocess.DEVNULL).decode('utf-8')
                  deps = []
                  for line in result.splitlines():
                      if "=>" in line and "ucrt64" in line.lower():
                          parts = line.split("=>")
                          if len(parts) > 1:
                              path = parts[1].split("(")[0].strip()
                              if os.path.exists(path):
                                  deps.append(path)
                  return deps
              except:
                  return []

          processed = set()
          while True:
              new_added = False
              # 扫描目录下所有的 exe 和 dll
              files_to_check = list(Path(target_dir).rglob("*.exe")) + list(Path(target_dir).rglob("*.dll"))
              for f in files_to_check:
                  f_str = str(f)
                  if f_str in processed: continue
                  
                  for dep in get_deps(f_str):
                      dep_name = os.path.basename(dep)
                      dest = os.path.join(target_dir, dep_name)
                      if not os.path.exists(dest):
                          print(f"  [+] Copying {dep_name} (needed by {f.name})")
                          shutil.copy2(dep, dest)
                          new_added = True
                  processed.add(f_str)
              
              if not new_added: break
          EOF

          echo "--- Stats ---"
          du -sh "$TARGET"
          echo "Files count: $(find "$TARGET" -type f | wc -l)"

      - name: Compress
        run: |
          7z a -mx=9 "${{ steps.vars.outputs.build_file_name }}" "./${{ steps.vars.outputs.build_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: qimgv-binary
          path: ${{ steps.vars.outputs.build_file_name }}

  upload-release:
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: qimgv-binary
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ needs.build.outputs.build_file_name }}
          prerelease: true
          tag_name: latest-dev-qt6-slim
          name: ${{ needs.build.outputs.build_name }}
          body: "Robust Slim Build: Python-based recursive dependency scan. Includes OpenCV, MPV, and KDE plugins."
