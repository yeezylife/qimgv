name: qimgv-qt6-slim
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    outputs:
      build_name: ${{ steps.vars.outputs.build_name }}
      build_file_name: ${{ steps.vars.outputs.build_file_name }}

    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            p7zip
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-ntldd
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-svg
            mingw-w64-ucrt-x86_64-qt6-imageformats
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-kimageformats
            mingw-w64-ucrt-x86_64-libjxl
            mingw-w64-ucrt-x86_64-libraw
            mingw-w64-ucrt-x86_64-exiv2
            mingw-w64-ucrt-x86_64-opencv
            mingw-w64-ucrt-x86_64-mpv
            mingw-w64-ucrt-x86_64-lcms2
            mingw-w64-ucrt-x86_64-libavif
            mingw-w64-ucrt-x86_64-libheif

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Variables
        id: vars
        run: |
          BNAME="qimgv-x64-qt6_$(git describe --tags --always)"
          echo "build_name=${BNAME}" >> $GITHUB_OUTPUT
          echo "build_file_name=${BNAME}.7z" >> $GITHUB_OUTPUT

      # ❗ 已删除所有 sed 修改，避免破坏 Windows API
      - name: No Unicode patch
        run: |
          echo "No Unicode patch applied."

      - name: Build qimgv
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_QT5=OFF \
            -DVIDEO_SUPPORT=ON \
            -DOPENCV_SUPPORT=ON \
            -DCMAKE_PREFIX_PATH=/ucrt64
          cmake --build build --config Release

- name: Prepare Slim Package
        run: |
          TARGET="./${{ steps.vars.outputs.build_name }}"
          mkdir -p "$TARGET/plugins/imageformats"
          mkdir -p "$TARGET/plugins/platforms"
          mkdir -p "$TARGET/plugins/styles"

          echo "Copy main executable"
          cp build/qimgv/qimgv.exe "$TARGET/"

          echo "Copy Qt basic plugins"
          cp /ucrt64/share/qt6/plugins/platforms/qwindows.dll "$TARGET/plugins/platforms/"
          
          # 使用通配符批量尝试拷贝，避免复杂的 if 判断
          cp /ucrt64/share/qt6/plugins/styles/q{fusion,windowsvista}style.dll "$TARGET/plugins/styles/" 2>/dev/null || true
          cp /ucrt64/share/qt6/plugins/imageformats/q{jpeg,gif,ico,svg,webp,wbmp}.dll "$TARGET/plugins/imageformats/" 2>/dev/null || true
          cp /ucrt64/share/kf6/plugins/imageformats/kimg_{jxl,heif,avif,exr,hdr}.dll "$TARGET/plugins/imageformats/" 2>/dev/null || true

          echo "Write qt.conf"
          echo -e "[Paths]\nPrefix = .\nPlugins = plugins" > "$TARGET/qt.conf"

          echo "Start dependency scan (Corrected)"
          # 核心修复：使用临时文件记录状态，避开 subshell 陷阱
          while true; do
            FOUND_ANY_NEW=false
            # 扫描所有 exe 和 dll
            for f in $(find "$TARGET" -type f \( -name "*.exe" -o -name "*.dll" \)); do
              # 提取所有在 /ucrt64 下的依赖路径
              deps=$(ntldd -R "$f" 2>/dev/null | grep "=> /ucrt64" | awk '{print $3}')
              
              for dep in $deps; do
                base=$(basename "$dep")
                if [ ! -f "$TARGET/$base" ]; then
                  cp "$dep" "$TARGET/"
                  echo "Added: $base (from $(basename $f))"
                  FOUND_ANY_NEW=true
                fi
              done
            done
            
            if [ "$FOUND_ANY_NEW" = false ]; then
              break
            fi
          done

          echo "Slim package ready. Files count: $(find "$TARGET" -type f | wc -l)"


      - name: Compress
        run: |
          7z a "${{ steps.vars.outputs.build_file_name }}" "./${{ steps.vars.outputs.build_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: qimgv-binary
          path: ${{ steps.vars.outputs.build_file_name }}

  upload-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: qimgv-binary

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ needs.build.outputs.build_file_name }}
          prerelease: true
          tag_name: latest-dev-qt6-slim
          name: ${{ needs.build.outputs.build_name }}
          body: "Slim build: reverse dependency scan + minimal Qt plugins."
