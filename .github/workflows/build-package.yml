name: qimgv-qt6-ultimate-fix
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    outputs:
      build_name: ${{ steps.vars.outputs.build_name }}
      build_file_name: ${{ steps.vars.outputs.build_file_name }}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git 
            p7zip 
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-ntldd
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-qt6-imageformats
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-libjxl
            mingw-w64-x86_64-libraw
            mingw-w64-x86_64-exiv2
            mingw-w64-x86_64-opencv
            mingw-w64-x86_64-mpv
            mingw-w64-x86_64-lcms2
            mingw-w64-x86_64-libavif
            mingw-w64-x86_64-libheif

      - uses: actions/checkout@v4
        with: 
          fetch-depth: 0

      - name: Set Variables
        id: vars
        run: |
          BNAME="qimgv-x64-qt6_$(git describe --tags --always)"
          echo "build_name=${BNAME}" >> $GITHUB_OUTPUT
          echo "build_file_name=${BNAME}.7z" >> $GITHUB_OUTPUT

      - name: Fix Windows Unicode Path Issue
        run: |
          sed -i 's/entry\.path()\.generic_string()\.c_str()/entry.path().wstring().c_str()/g' \
            qimgv/components/directorymanager/directorymanager.cpp

      - name: Build qimgv
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_QT5=OFF \
            -DVIDEO_SUPPORT=ON \
            -DOPENCV_SUPPORT=ON \
            -DCMAKE_PREFIX_PATH=/mingw64
          cmake --build build --config Release

      - name: Prepare Package
        run: |
          TARGET_DIR="./${{ steps.vars.outputs.build_name }}"
          mkdir -p "${TARGET_DIR}/imageformats"
          mkdir -p "${TARGET_DIR}/translations"
          mkdir -p "${TARGET_DIR}/platforms"
          mkdir -p "${TARGET_DIR}/styles"
          
          # 1. 拷贝主程序
          cp build/qimgv/qimgv.exe "${TARGET_DIR}/"
          
          # 2. 下载并安装 JXL 插件
          echo "Downloading JXL plugin..."
          curl -L -o "${TARGET_DIR}/imageformats/qjpegxl6.dll" \
            https://github.com/novomesk/qt-jpegxl-image-plugin/releases/latest/download/qjpegxl6.dll  
          
          # 3. 部署 Qt6 基础环境 (使用 verbose 模式便于调试)
          echo "Deploying Qt dependencies..."
          windeployqt --verbose --no-translations --compiler-runtime --no-opengl-sw "${TARGET_DIR}/qimgv.exe" || true
          
          # 4. 强制补充 Qt 插件
          echo "Copying Qt plugins..."
          cp -f /mingw64/share/qt6/plugins/imageformats/*.dll "${TARGET_DIR}/imageformats/" || true
          cp -f /mingw64/share/qt6/plugins/platforms/qwindows.dll "${TARGET_DIR}/platforms/" || true
          cp -f /mingw64/share/qt6/plugins/styles/*.dll "${TARGET_DIR}/styles/" || true
          
          # 5. 拷贝 qimgv 自身的翻译文件
          cp -f build/qimgv/translations/*.qm "${TARGET_DIR}/translations/" || true
          # 补充 Qt 翻译文件
          cp -f /mingw64/share/qt6/translations/qt_*.qm "${TARGET_DIR}/translations/" || true
          
          # 6. 【关键修复】扩大 DLL 依赖收集范围
          echo "Collecting ALL required DLLs..."
          
          # 6.1 Qt 核心库 (必须包含)
          QT_PATTERNS=(
            "Qt6Core*.dll" "Qt6Gui*.dll" "Qt6Widgets*.dll" "Qt6Svg*.dll"
            "Qt6Network*.dll" "Qt6Concurrent*.dll" "Qt6DBus*.dll"
            "libb2*.dll" "libdouble-conversion*.dll"
            "libicudata*.dll" "libicuin*.dll" "libicuuc*.dll"
            "libfreetype*.dll" "libharfbuzz*.dll" "libgraphite2*.dll"
            "libpng*.dll" "libjpeg*.dll" "libtiff*.dll"
          )
          
          # 6.2 OpenCV 及相关数学库
          OPENCV_PATTERNS=(
            "libopencv_core*.dll" "libopencv_imgproc*.dll" "libopencv_imgcodecs*.dll"
            "libopencv_videoio*.dll" "libopencv_highgui*.dll"
            "libtbb*.dll" "libopenblas*.dll" "liblapack*.dll"
          )
          
          # 6.3 图像格式库
          IMAGE_PATTERNS=(
            "libjxl*.dll" "libjxl_threads*.dll" "libraw*.dll"
            "libheif*.dll" "libavif*.dll" "libwebp*.dll" "libwebpdemux*.dll"
            "libhwy*.dll" "libbrotli*.dll" "libaom*.dll"
          )
          
          # 6.4 其他多媒体库
          MEDIA_PATTERNS=(
            "libmpv*.dll" "libavcodec*.dll" "libavformat*.dll" "libavutil*.dll"
            "libswscale*.dll" "libswresample*.dll"
            "liblcms2*.dll" "libexiv2*.dll"
          )
          
          # 6.5 运行时库 (必须)
          RUNTIME_PATTERNS=(
            "libstdc++*.dll" "libgcc_s*.dll" "libwinpthread*.dll"
            "zlib*.dll" "libzstd*.dll"
          )
          
          # 合并所有模式
          ALL_PATTERNS=(
            "${QT_PATTERNS[@]}" "${OPENCV_PATTERNS[@]}" "${IMAGE_PATTERNS[@]}"
            "${MEDIA_PATTERNS[@]}" "${RUNTIME_PATTERNS[@]}"
          )
          
          for pattern in "${ALL_PATTERNS[@]}"; do
            find /mingw64/bin -maxdepth 1 -name "$pattern" -exec cp -t "${TARGET_DIR}/" {} + 2>/dev/null || true
          done
          
          # 7. 【增强】深度依赖扫描 - 多轮迭代确保捕获所有传递依赖
          echo "Scanning for deep dependencies (3 passes)..."
          for i in {1..5}; do
            echo "Pass #$i"
            find "${TARGET_DIR}" \( -name "*.exe" -o -name "*.dll" \) -print0 | \
              xargs -0 ntldd -R 2>/dev/null | \
              grep "=> /mingw64" | \
              awk '{print $3}' | \
              sort -u | \
              xargs -r -I {} cp -n {} "${TARGET_DIR}/" 2>/dev/null || true
          done
          
          # 8. 【备用方案】如果还有缺失，直接拷贝 /mingw64/bin 中所有 lib*.dll
          # 这会增加包体积，但能确保不缺失任何依赖
          echo "Copying remaining lib*.dll as fallback..."
          find /mingw64/bin -maxdepth 1 -name "lib*.dll" -exec cp -n -t "${TARGET_DIR}/" {} + 2>/dev/null || true
          
          # 9. 生成 qt.conf
          echo -e "[Paths]\nPrefix = .\nPlugins = plugins\nTranslations = translations" > "${TARGET_DIR}/qt.conf"
          
          # 10. 验证关键 DLL 是否存在
          echo "Verifying critical DLLs..."
          for dll in Qt6Core.dll Qt6Gui.dll Qt6Widgets.dll libstdc++-6.dll libgcc_s_seh-1.dll; do
            if [ -f "${TARGET_DIR}/${dll}" ]; then
              echo "✓ ${dll} found"
            else
              echo "✗ ${dll} MISSING!"
            fi
          done
          
          echo "Package preparation completed."
          echo "Total files in package: $(find "${TARGET_DIR}" -type f | wc -l)"

      - name: Compress
        run: |
          7z a "${{ steps.vars.outputs.build_file_name }}" "./${{ steps.vars.outputs.build_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: qimgv-binary
          path: ${{ steps.vars.outputs.build_file_name }}

  upload-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with: 
          name: qimgv-binary
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ needs.build.outputs.build_file_name }}
          prerelease: true
          tag_name: latest-dev-qt6
          name: ${{ needs.build.outputs.build_name }}
          body: "Fixed: Added comprehensive DLL dependency collection including Qt core libs (ICU, Freetype, Harfbuzz, etc.)"
