name: qimgv-qt6-ultimate-fix
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    outputs:
      build_name: ${{ steps.vars.outputs.build_name }}
      build_file_name: ${{ steps.vars.outputs.build_file_name }}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git 
            p7zip 
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-ntldd
            mingw-w64-x86_64-extra-cmake-modules
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-qt6-imageformats
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-libjxl
            mingw-w64-x86_64-libraw
            mingw-w64-x86_64-exiv2
            mingw-w64-x86_64-opencv
            mingw-w64-x86_64-mpv
            mingw-w64-x86_64-lcms2

      - uses: actions/checkout@v4
        with: 
          fetch-depth: 0

      - name: Set Variables
        id: vars
        run: |
          BNAME="qimgv-x64-qt6_$(git describe --tags --always)"
          echo "build_name=${BNAME}" >> $GITHUB_OUTPUT
          echo "build_file_name=${BNAME}.7z" >> $GITHUB_OUTPUT

      - name: Build JXL Plugin
        run: |
          # 克隆并进入插件目录
          git clone https://github.com/novomesk/qt-jpegxl-image-plugin.git
          # ECM 需要在这里显式指定 Qt6 且使用 Ninja 构建
          cmake -B build-jxl -S qt-jpegxl-image-plugin -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DQT_VERSION_MAJOR=6 \
            -DCMAKE_PREFIX_PATH=/mingw64
          cmake --build build-jxl

      - name: Fix Windows Unicode Path Issue
        run: |
          # 修复 directorymanager.cpp 中的字符编码问题
          sed -i 's/entry\.path()\.generic_string()\.c_str()/entry.path().wstring().c_str()/g' \
            qimgv/components/directorymanager/directorymanager.cpp

      - name: Build qimgv
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_QT5=OFF \
            -DVIDEO_SUPPORT=ON \
            -DOPENCV_SUPPORT=ON \
            -DCMAKE_PREFIX_PATH=/mingw64
          cmake --build build --config Release

      - name: Prepare Package
        run: |
          TARGET_DIR="./${{ steps.vars.outputs.build_name }}"
          mkdir -p "${TARGET_DIR}"
          cp build/qimgv/qimgv.exe "${TARGET_DIR}/"
          
          # 1. 部署 Qt 基础环境
          windeployqt6 --no-translations --compiler-runtime --no-opengl-sw "${TARGET_DIR}/qimgv.exe"
          
          # 2. 部署 JXL 插件 (关键：手动拷贝编译出的 dll)
          mkdir -p "${TARGET_DIR}/imageformats"
          cp build-jxl/qjxl.dll "${TARGET_DIR}/imageformats/"
          
          # 3. 补充官方 imageformats (如 svg, ico 等)
          cp -f /mingw64/share/qt6/plugins/imageformats/*.dll "${TARGET_DIR}/imageformats/" || true
          
          # 4. 生成配置文件
          echo -e "[Paths]\nPrefix = .\nPlugins = ." > "${TARGET_DIR}/qt.conf"
          
          # 5. 拷贝翻译
          mkdir -p "${TARGET_DIR}/translations"
          cp -f build/qimgv/translations/*.qm "${TARGET_DIR}/translations/" || true
          
          # 6. 递归补全 DLL 依赖 (针对 mpv, opencv, libjxl 等第三方库)
          echo "Deep scanning for DLL dependencies..."
          for i in {1..3}; do
            find "${TARGET_DIR}" -name "*.exe" -o -name "*.dll" | xargs ntldd -R | grep "=> /mingw64" | awk '{print $3}' | sort -u | xargs -I {} cp -n {} "${TARGET_DIR}/"
          done

      - name: Compress
        run: |
          7z a "${{ steps.vars.outputs.build_file_name }}" "./${{ steps.vars.outputs.build_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: qimgv-binary
          path: ${{ steps.vars.outputs.build_file_name }}

  upload-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with: 
          name: qimgv-binary
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ needs.build.outputs.build_file_name }}
          prerelease: true
          tag_name: latest-dev-qt6
          name: ${{ needs.build.outputs.build_name }}
          body: "Fixed ECM dependency and added JPEG-XL plugin support."
