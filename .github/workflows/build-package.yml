name: msys2 dev-latest (Qt6 + libjxl + jpegxl plugin)

on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            p7zip
            mingw-w64-x86_64-ntldd
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-extra-cmake-modules
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-exiv2
            mingw-w64-x86_64-lerc
            mingw-w64-x86_64-aom
            mingw-w64-x86_64-libavif
            mingw-w64-x86_64-libheif
            mingw-w64-x86_64-libwebp
            mingw-w64-x86_64-libmng
            mingw-w64-x86_64-libraw
            mingw-w64-x86_64-gflags
            mingw-w64-x86_64-libjxl
            mingw-w64-x86_64-opencv
            mingw-w64-x86_64-mpv

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: build
        name: CI-Build
        run: |
          export BUILD_NAME="qimgv-x64_$(git describe --tags --always)"
          echo "build_name=${BUILD_NAME}" >> $GITHUB_OUTPUT
          echo "build_file_name=${BUILD_NAME}.7z" >> $GITHUB_OUTPUT

          mkdir -p build
          cd build

          cmake .. -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_QT5=OFF \
            -DEXIV2=ON \
            -DVIDEO_SUPPORT=ON \
            -DOPENCV_SUPPORT=ON \
            -DKDE_SUPPORT=OFF \
            -DCMAKE_INSTALL_PREFIX="${PWD}/install"

          cmake --build . -j$(nproc)

          cmake --install .

          TARGET_DIR="../${BUILD_NAME}"
          mkdir -p "${TARGET_DIR}"

          cp -r install/bin/* "${TARGET_DIR}/" 2>/dev/null || true
          cp -r install/share "${TARGET_DIR}/" 2>/dev/null || true

          windeployqt --no-translations --compiler-runtime "${TARGET_DIR}/qimgv.exe"

          # 构建 qt-jpegxl-image-plugin (JXL 支持插件)
          cd ..
          git clone https://github.com/novomesk/qt-jpegxl-image-plugin.git
          cd qt-jpegxl-image-plugin
          mkdir build && cd build
          cmake .. -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DQT_VERSION_MAJOR=6
          cmake --build . -j$(nproc)

          # 复制插件 DLL（仓库中项目名为 qjpegxl）
          mkdir -p "../../${BUILD_NAME}/imageformats"
          cp qjpegxl.dll "../../${BUILD_NAME}/imageformats/" || cp *.dll "../../${BUILD_NAME}/imageformats/" || true

          # 可选：如果想额外加 KDE kimageformats 插件（Qt6 版包存在）
          cd ../..
          mkdir -p "${BUILD_NAME}/imageformats"
          cp /mingw64/lib/qt6/plugins/imageformats/kimg_*.dll "${BUILD_NAME}/imageformats/" || true

          # ntldd 递归收集所有依赖 DLL
          echo "Collecting dependencies with ntldd..."
          declare -A seen
          collect_dlls() {
            local file="$1"
            [ ! -f "$file" ] && return
            local dlls=$(ntldd -R "$file" 2>/dev/null | grep -i "mingw64" | cut -d'>' -f2 | cut -d'(' -f1 | sed 's/^[ \t]*//;s/[ \t]*$//')
            for dll in $dlls; do
              if [ -f "$dll" ] && [ -z "${seen[$dll]}" ]; then
                seen["$dll"]=1
                cp -vn "$dll" "${BUILD_NAME}/"
                collect_dlls "$dll"
              fi
            done
          }

          collect_dlls "${BUILD_NAME}/qimgv.exe"
          for f in "${BUILD_NAME}"/*.dll "${BUILD_NAME}/imageformats"/*.dll; do
            [ -f "$f" ] && collect_dlls "$f"
          done

          # 打包
          7z a "${BUILD_NAME}.7z" "${BUILD_NAME}/"

      - uses: actions/upload-artifact@v4
        with:
          name: qimgv-build
          path: ${{ steps.build.outputs.build_file_name }}

    outputs:
      build_name: ${{ steps.build.outputs.build_name }}
      build_file_name: ${{ steps.build.outputs.build_file_name }}

  upload-release:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: qimgv-build

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ needs.build.outputs.build_file_name }}
          tag_name: latest-dev
          name: ${{ needs.build.outputs.build_name }}
          prerelease: true
          body: "Automated Qt6 build with qt-jpegxl-image-plugin (JXL), libjxl deps, AVIF/HEIF/WebP support via upstream libs."
