name: qimgv-qt6-slim
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    outputs:
      build_name: ${{ steps.vars.outputs.build_name }}
      build_file_name: ${{ steps.vars.outputs.build_file_name }}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            p7zip
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-ntldd
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-svg
            mingw-w64-ucrt-x86_64-qt6-imageformats
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-kimageformats
            mingw-w64-ucrt-x86_64-libjxl
            mingw-w64-ucrt-x86_64-libraw
            mingw-w64-ucrt-x86_64-exiv2
            mingw-w64-ucrt-x86_64-opencv
            mingw-w64-ucrt-x86_64-mpv
            mingw-w64-ucrt-x86_64-lcms2
            mingw-w64-ucrt-x86_64-libavif
            mingw-w64-ucrt-x86_64-libheif

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Variables
        id: vars
        run: |
          BNAME="qimgv-x64-qt6_$(git describe --tags --always)"
          echo "build_name=${BNAME}" >> $GITHUB_OUTPUT
          echo "build_file_name=${BNAME}.7z" >> $GITHUB_OUTPUT

      - name: Build qimgv
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_QT5=OFF \
            -DVIDEO_SUPPORT=ON \
            -DOPENCV_SUPPORT=ON \
            -DCMAKE_PREFIX_PATH=/ucrt64
          cmake --build build --config Release

      - name: Prepare Slim Package
        run: |
          TARGET="./${{ steps.vars.outputs.build_name }}"
          # 创建目录结构
          mkdir -p "$TARGET/plugins/imageformats"
          mkdir -p "$TARGET/plugins/platforms"
          mkdir -p "$TARGET/plugins/styles"

          echo "--- Copying main executable ---"
          cp build/qimgv/qimgv.exe "$TARGET/"

          echo "--- Copying Essential Qt Plugins ---"
          # 1. 拷贝平台插件 (Windows 运行必选)
          cp /ucrt64/share/qt6/plugins/platforms/qwindows.dll "$TARGET/plugins/platforms/"
          
          # 2. 拷贝外观样式 (防止界面变得难看)
          cp /ucrt64/share/qt6/plugins/styles/q{fusion,windowsvista}style.dll "$TARGET/plugins/styles/" 2>/dev/null || true

          # 3. 拷贝基础图像格式
          for fmt in qjpeg.dll qgif.dll qico.dll qsvg.dll qwebp.dll qwbmp.dll; do
            if [ -f "/ucrt64/share/qt6/plugins/imageformats/$fmt" ]; then
              cp "/ucrt64/share/qt6/plugins/imageformats/$fmt" "$TARGET/plugins/imageformats/"
            fi
          done

          # 4. 拷贝 KDE 扩展图像格式 (HEIC, JXL 等)
          for kfmt in kimg_jxl.dll kimg_heif.dll kimg_avif.dll kimg_exr.dll kimg_hdr.dll; do
            if [ -f "/ucrt64/share/kf6/plugins/imageformats/$kfmt" ]; then
              cp "/ucrt64/share/kf6/plugins/imageformats/$kfmt" "$TARGET/plugins/imageformats/"
            fi
          done

          echo "--- Writing qt.conf ---"
          # 告诉程序去当前目录的 plugins 文件夹加载插件
          echo -e "[Paths]\nPrefix = .\nPlugins = plugins" > "$TARGET/qt.conf"

          echo "--- Starting Recursive Dependency Scan ---"
          iteration=0
          while true; do
            iteration=$((iteration+1))
            NEW_DEP_FOUND=false
            echo "Scan iteration $iteration..."
            
            # 找到文件夹内现有的所有 exe 和 dll
            # 存入临时文件防止文件名空格导致的 for 循环拆分问题
            find "$TARGET" -type f \( -name "*.exe" -o -name "*.dll" \) > files_to_scan.txt
            
            while IFS= read -r f; do
              # 使用 || true 防止 grep 找不到结果时导致 GitHub Actions 中断步骤
              # awk 提取 => 之后的第三列（路径）
              deps=$(ntldd -R "$f" 2>/dev/null | grep "=> /ucrt64" | awk '{print $3}' || true)
              
              if [ -n "$deps" ]; then
                for dep_path in $deps; do
                  dep_name=$(basename "$dep_path")
                  if [ ! -f "$TARGET/$dep_name" ]; then
                    cp "$dep_path" "$TARGET/"
                    echo "  [+] Added $dep_name (needed by $(basename "$f"))"
                    NEW_DEP_FOUND=true
                  fi
                done
              fi
            done < files_to_scan.txt
            
            # 如果这一轮没找到新依赖，或者达到最大限制（防止死循环），则退出
            if [ "$NEW_DEP_FOUND" = false ] || [ $iteration -gt 20 ]; then
              break
            fi
          done
          rm -f files_to_scan.txt

          echo "--- Slim package ready ---"
          echo "Total files: $(find "$TARGET" -type f | wc -l)"
          du -sh "$TARGET"

      - name: Compress
        run: |
          7z a "${{ steps.vars.outputs.build_file_name }}" "./${{ steps.vars.outputs.build_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: qimgv-binary
          path: ${{ steps.vars.outputs.build_file_name }}

  upload-release:
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: qimgv-binary
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ needs.build.outputs.build_file_name }}
          prerelease: true
          tag_name: latest-dev-qt6-slim
          name: ${{ needs.build.outputs.build_name }}
          body: "Slim build based on recursive dependency scan (Qt6 + KF6 plugins included)."
