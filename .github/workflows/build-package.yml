name: qimgv-qt6-slim
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    outputs:
      build_name: ${{ steps.vars.outputs.build_name }}
      build_file_name: ${{ steps.vars.outputs.build_file_name }}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            p7zip
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-ntldd
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-svg
            mingw-w64-ucrt-x86_64-qt6-imageformats
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-kimageformats
            mingw-w64-ucrt-x86_64-libjxl
            mingw-w64-ucrt-x86_64-libraw
            mingw-w64-ucrt-x86_64-exiv2
            mingw-w64-ucrt-x86_64-opencv
            mingw-w64-ucrt-x86_64-mpv
            mingw-w64-ucrt-x86_64-lcms2
            mingw-w64-ucrt-x86_64-libavif
            mingw-w64-ucrt-x86_64-libheif

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Variables
        id: vars
        run: |
          BNAME="qimgv-x64-qt6_$(git describe --tags --always)"
          echo "build_name=${BNAME}" >> $GITHUB_OUTPUT
          echo "build_file_name=${BNAME}.7z" >> $GITHUB_OUTPUT

      - name: Build qimgv
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_QT5=OFF \
            -DVIDEO_SUPPORT=ON \
            -DOPENCV_SUPPORT=ON \
            -DCMAKE_PREFIX_PATH=/ucrt64
          cmake --build build --config Release

      - name: Prepare Slim Package
        run: |
          TARGET="./${{ steps.vars.outputs.build_name }}"
          mkdir -p "$TARGET/plugins/imageformats"
          mkdir -p "$TARGET/plugins/platforms"
          mkdir -p "$TARGET/plugins/styles"

          echo "--- Copying core executable ---"
          cp build/qimgv/qimgv.exe "$TARGET/"

          echo "--- Copying Qt plugins ---"
          cp /ucrt64/share/qt6/plugins/platforms/qwindows.dll "$TARGET/plugins/platforms/" 2>/dev/null || true
          cp /ucrt64/share/qt6/plugins/styles/qfusionstyle.dll "$TARGET/plugins/styles/" 2>/dev/null || true
          cp /ucrt64/share/qt6/plugins/styles/qwindowsvistastyle.dll "$TARGET/plugins/styles/" 2>/dev/null || true

          cp /ucrt64/share/qt6/plugins/imageformats/q{jpeg,gif,ico,svg,webp,wbmp}.dll "$TARGET/plugins/imageformats/" 2>/dev/null || true
          cp /ucrt64/share/kf6/plugins/imageformats/kimg_{jxl,heif,avif,exr,hdr}.dll "$TARGET/plugins/imageformats/" 2>/dev/null || true

          echo "--- Writing qt.conf ---"
          echo -e "[Paths]\nPrefix = .\nPlugins = plugins" > "$TARGET/qt.conf"

          echo "--- Starting Recursive Dependency Scan ---"
          iteration=0
          while true; do
            iteration=$((iteration+1))
            echo "Scan iteration $iteration..."
            NEW_DEP_FOUND=false

            # 生成扫描列表（避免空格路径问题）
            find "$TARGET" -type f \( -name "*.exe" -o -name "*.dll" \) > scan_list.txt

            while IFS= read -r f; do
              # 获取 ntldd 输出
              raw_deps=$(ntldd -R "$f" 2>/dev/null || true)

              # 提取所有 DLL 路径（最通用、最稳的匹配）
              echo "$raw_deps" | grep -oP '([A-Z]:)?/[^ ]+\.dll' | while read -r dep_path; do
                if [ -f "$dep_path" ]; then
                  dep_name=$(basename "$dep_path")
                  if [ ! -f "$TARGET/$dep_name" ]; then
                    cp "$dep_path" "$TARGET/"
                    echo "  [+] Added: $dep_name (required by $(basename "$f"))"
                    echo "found" > found.tmp
                  fi
                fi
              done

            done < scan_list.txt

            # 检查是否发现新依赖
            if [ -f found.tmp ]; then
              NEW_DEP_FOUND=true
              rm found.tmp
            fi

            # 没有新依赖 → 结束
            if [ "$NEW_DEP_FOUND" = false ]; then
              echo "No more dependencies found. Scan complete."
              break
            fi

            # 防止死循环
            if [ $iteration -gt 30 ]; then
              echo "Reached max iteration limit."
              break
            fi
          done

          rm -f scan_list.txt

          echo "--- Slim package ready ---"
          echo "Total files: $(find "$TARGET" -type f | wc -l)"
          du -sh "$TARGET"

      - name: Compress
        run: |
          7z a "${{ steps.vars.outputs.build_file_name }}" "./${{ steps.vars.outputs.build_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: qimgv-binary
          path: ${{ steps.vars.outputs.build_file_name }}

  upload-release:
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: qimgv-binary
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ needs.build.outputs.build_file_name }}
          prerelease: true
          tag_name: latest-dev-qt6-slim
          name: ${{ needs.build.outputs.build_name }}
          body: "Fix: Enhanced dependency scanner with manual core-lib pre-copy."
