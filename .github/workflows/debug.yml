name: debug
on: [workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    outputs:
      build_name: ${{ steps.vars.outputs.build_name }}
      build_file_name: ${{ steps.vars.outputs.build_file_name }}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            git
            p7zip
            mingw-w64-clang-x86_64-gcc
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-ninja
            mingw-w64-clang-x86_64-ntldd
            mingw-w64-clang-x86_64-pkgconf
            mingw-w64-clang-x86_64-kwindowsystem
            mingw-w64-clang-x86_64-qt6-base
            mingw-w64-clang-x86_64-qt6-svg
            mingw-w64-clang-x86_64-qt6-imageformats
            mingw-w64-clang-x86_64-qt6-tools
            mingw-w64-clang-x86_64-kimageformats
            mingw-w64-clang-x86_64-libjxl
            mingw-w64-clang-x86_64-libraw
            mingw-w64-clang-x86_64-opencv
            mingw-w64-clang-x86_64-mpv
            mingw-w64-clang-x86_64-lcms2
            mingw-w64-clang-x86_64-libavif
            mingw-w64-clang-x86_64-libheif
            python3
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set Variables
        id: vars
        run: |
          BNAME="qimgv-x64-debug"
          echo "build_name=${BNAME}" >> $GITHUB_OUTPUT
          echo "build_file_name=${BNAME}.7z" >> $GITHUB_OUTPUT
      # 🔧 修改后的调试构建步骤
      - name: Build qimgv (Debug Strict Mode)
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DUSE_QT5=OFF \
            -DVIDEO_SUPPORT=ON \
            -DOPENCV_SUPPORT=ON \
            -DCMAKE_PREFIX_PATH=/clang64 \
            -DQT_NO_DEBUG_OUTPUT=ON \
            -DCMAKE_CXX_FLAGS="\
              -DQT_NO_DEBUG_OUTPUT \
              -O1 -g3 -fno-omit-frame-pointer \
              -march=x86-64-v3 \
              -Wall -Wextra -Werror \
              -Wconversion \
              -Wsign-conversion \
              -Wsign-compare \
              -Wnarrowing \
              -Wold-style-cast \
              -Wcast-qual \
              -Wcast-align=strict \
              -pedantic -Wpedantic \
              -Wzero-as-null-pointer-constant \
              -Wnon-virtual-dtor \
              -Woverloaded-virtual \
              -Wsuggest-override \
              -Wmissing-declarations \
              -Wredundant-decls \
              -Wshadow \
              -Wundef \
              -Wdouble-promotion \
              -Wformat=2 \
              -Wmisleading-indentation \
              -Wduplicated-branches \
              -Wduplicated-cond \
              -Wlogical-op \
              -Wno-unused-parameter \
            " \
            -DCMAKE_C_FLAGS="\
              -DQT_NO_DEBUG_OUTPUT \
              -O1 -g3 -fno-omit-frame-pointer \
              -march=x86-64-v3 \
              -Wall -Wextra -Werror \
              -Wconversion \
              -Wsign-conversion \
              -Wsign-compare \
              -Wnarrowing \
              -Wold-style-cast \
              -Wcast-qual \
              -Wcast-align=strict \
              -pedantic -Wpedantic \
              -Wzero-as-null-pointer-constant \
              -Wmissing-declarations \
              -Wredundant-decls \
              -Wshadow \
              -Wundef \
              -Wdouble-promotion \
              -Wformat=2 \
              -Wmisleading-indentation \
              -Wduplicated-branches \
              -Wduplicated-cond \
              -Wlogical-op \
            "
          cmake --build build --config Debug

      - name: Prepare Debug Package
        run: |
          TARGET="./${{ steps.vars.outputs.build_name }}"
          
          # 创建目录结构（windeployqt 会填充大部分，但先准备好）
          mkdir -p "$TARGET"
          
          echo "--- Copying Debug Executable ---"
          cp build/qimgv/qimgv.exe "$TARGET/"
          
          echo "--- Running windeployqt for complete Qt + runtime deployment ---"
          /clang64/bin/windeployqt.exe \
            --plugindir "$TARGET" \
            --no-translations \
            --no-system-d3d-compiler \
            --no-opengl-sw \
            --compiler-runtime \
            --dir "$TARGET" \
            "$TARGET/qimgv.exe"
          
          # windeployqt 会自动创建 platforms/、imageformats/ 等并填充 qwindows.dll + Qt DLL + MinGW runtime
          # 手动创建补充目录（以防某些插件路径未覆盖）
          mkdir -p "$TARGET/platforms" "$TARGET/imageformats" "$TARGET/styles" "$TARGET/iconengines" "$TARGET/plugins"
          
          echo "--- Supplementing Qt Plugins (if needed) ---"
          PLUGIN_SOURCES=(
            "/clang64/lib/qt6/plugins"
            "/clang64/share/qt6/plugins"
            "/clang64/lib/kf6/plugins"
          )
          for src in "${PLUGIN_SOURCES[@]}"; do
            if [ -d "$src" ]; then
              echo "Checking $src..."
              [ -d "$src/platforms" ]     && cp -n "$src/platforms/qwindows.dll"     "$TARGET/platforms/"     2>/dev/null || true
              [ -d "$src/imageformats" ]  && cp -n "$src/imageformats"/*.dll         "$TARGET/imageformats/"  2>/dev/null || true
              [ -d "$src/styles" ]        && cp -n "$src/styles"/*.dll               "$TARGET/styles/"        2>/dev/null || true
              [ -d "$src/iconengines" ]   && cp -n "$src/iconengines"/*.dll          "$TARGET/iconengines/"   2>/dev/null || true
            fi
          done
          
          # 拷贝视频插件（mpv 后端）
          if [ -f "build/plugins/player_mpv/player_mpv.dll" ]; then
            cp build/plugins/player_mpv/player_mpv.dll "$TARGET/plugins/"
            echo "Copied player_mpv.dll"
          fi
          
          # 拷贝翻译文件（windeployqt 默认不带，这里手动）
          if [ -d "build/qimgv/translations" ]; then
            cp -r build/qimgv/translations "$TARGET/"
            echo "Copied translations"
          fi
          
          echo "--- Creating qt.conf ---"
          echo -e "[Paths]\nPrefix = .\nPlugins = .\nLibraryExecutables = ." > "$TARGET/qt.conf"
          
          echo "--- Dependency Resolution (补充 windeployqt 未覆盖的依赖，如 libmpv/cairo 等) ---"
          python3 - <<EOF
          import os, subprocess, shutil
          from pathlib import Path
          target_dir = os.path.abspath("$TARGET")
         
          def get_ntldd_deps(file_path):
              try:
                  out = subprocess.check_output(["ntldd", "-R", file_path], stderr=subprocess.DEVNULL).decode('utf-8', 'ignore')
                  deps = []
                  for line in out.splitlines():
                      if "=>" in line and "clang64" in line.lower():
                          parts = line.split("=>")
                          if len(parts) > 1:
                              path = parts[1].split("(")[0].strip()
                              if os.path.exists(path):
                                  deps.append(path)
                  return deps
              except:
                  return []
          scanned_files = set()
          while True:
              found_new = False
              current_files = list(Path(target_dir).rglob("*.exe")) + list(Path(target_dir).rglob("*.dll"))
             
              for f in current_files:
                  f_path = str(f.absolute())
                  if f_path in scanned_files: continue
                 
                  deps = get_ntldd_deps(f_path)
                  for d in deps:
                      d_name = os.path.basename(d)
                      dest = os.path.join(target_dir, d_name)
                     
                      if not os.path.exists(dest):
                          print(f" [+] Found dependency: {d_name} (needed by {f.name})")
                          shutil.copy2(d, dest)
                          found_new = True
                  scanned_files.add(f_path)
             
              if not found_new: break
         
          print("Dependency resolution complete.")
          EOF
          
          echo "--- Debug Package Contents ---"
          echo "Key files:"
          ls -la "$TARGET/qimgv.exe"
          ls -la "$TARGET/platforms/" || echo "No platforms dir"
          ls -la "$TARGET/plugins/" || echo "No plugins dir"
          ls -la "$TARGET" | grep -E "libgcc|libstdc|libgfortran|libcairo|player_mpv|qwindows" || echo "Check for runtimes"
          du -sh "$TARGET"
      - name: Compress Debug Package
        run: |
          7z a -mx=9 "${{ steps.vars.outputs.build_file_name }}" "./${{ steps.vars.outputs.build_name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: qimgv-debug-binary-clang
          path: ${{ steps.vars.outputs.build_file_name }}
