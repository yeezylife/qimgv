name: qimgv-CI-Strict-Check
on: [workflow_dispatch]

jobs:
  build-test:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            git
            mingw-w64-clang-x86_64-gcc
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-ninja
            mingw-w64-clang-x86_64-ntldd
            mingw-w64-clang-x86_64-pkgconf
            mingw-w64-clang-x86_64-kwindowsystem
            mingw-w64-clang-x86_64-qt6-base
            mingw-w64-clang-x86_64-clang-tools-extra
            mingw-w64-clang-x86_64-qt6-svg
            mingw-w64-clang-x86_64-qt6-imageformats
            mingw-w64-clang-x86_64-qt6-tools
            mingw-w64-clang-x86_64-kimageformats
            mingw-w64-clang-x86_64-libjxl
            mingw-w64-clang-x86_64-libraw
            mingw-w64-clang-x86_64-opencv
            mingw-w64-clang-x86_64-mpv
            mingw-w64-clang-x86_64-lcms2
            mingw-w64-clang-x86_64-libavif
            mingw-w64-clang-x86_64-libheif

      - uses: actions/checkout@v4

      - name: Build qimgv (Debug Strict Mode)
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DUSE_QT5=OFF \
            -DVIDEO_SUPPORT=ON \
            -DOPENCV_SUPPORT=ON \
            -DCMAKE_PREFIX_PATH=/clang64 \
            -DCMAKE_CXX_CLANG_TIDY="clang-tidy;-checks=-*,bugprone-*,clang-analyzer-*,performance-*,concurrency-*,-performance-unnecessary-value-param" \
            -DCMAKE_CXX_FLAGS="\
              -O0 -g3 -fno-omit-frame-pointer \
              -march=x86-64-v3 \
              -Wall -Wextra -Werror \
              -Wconversion \
              -Wsign-conversion \
              -Wsign-compare \
              -Wnarrowing \
              -Wold-style-cast \
              -Wcast-qual \
              -Wcast-align \
              -pedantic -Wpedantic \
              -Wzero-as-null-pointer-constant \
              -Wnon-virtual-dtor \
              -Woverloaded-virtual \
              -Wsuggest-override \
              -Wmissing-declarations \
              -Wredundant-decls \
              -Wshadow \
              -Wundef \
              -Wdouble-promotion \
              -Wformat=2 \
              -Wmisleading-indentation \
              -Wlogical-op-parentheses \
              -Wno-unused-parameter \
              -Wdocumentation \
              -Wimplicit-fallthrough \
              -Wunused-macros \
              -Wdisabled-optimization \
              -Wpadded \
              -Wweak-vtables \
              -Wexit-time-destructors \
              -Wglobal-constructors \
              -Wswitch \
              -Wfloat-conversion \
              -Wshorten-64-to-32 \
              -Wnull-dereference \
              -Wself-assign \
              -Wself-assign-field \
              -Wtautological-compare \
              -Wunused-private-field \
              -Wunused-lambda-capture \
              -Wrange-loop-analysis \
              -Wunreachable-code \
              -Wunused-template \
              -fsanitize=address,undefined" \
            -DCMAKE_C_FLAGS="\
              -O0 -g3 -fno-omit-frame-pointer \
              -march=x86-64-v3 \
              -Wall -Wextra -Werror \
              -Wconversion \
              -Wsign-conversion \
              -Wsign-compare \
              -Wnarrowing \
              -Wold-style-cast \
              -Wcast-qual \
              -Wcast-align \
              -pedantic -Wpedantic \
              -Wzero-as-null-pointer-constant \
              -Wmissing-declarations \
              -Wredundant-decls \
              -Wshadow \
              -Wundef \
              -Wdouble-promotion \
              -Wformat=2 \
              -Wmisleading-indentation \
              -Wlogical-op-parentheses \
              -Wdocumentation \
              -Wimplicit-fallthrough \
              -Wunused-macros \
              -Wdisabled-optimization \
              -Wpadded \
              -Wswitch \
              -Wfloat-conversion \
              -Wshorten-64-to-32 \
              -Wnull-dereference \
              -Wself-assign \
              -Wself-assign-field \
              -Wtautological-compare \
              -Wunreachable-code \
              -Wunused-template \
              -fsanitize=address,undefined"
          cmake --build build --config Debug
